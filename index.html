<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Session 87</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="design-tokens.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    />
    <style>
      @font-face {
        font-family: 'Inter';
        src: url('static/fonts/Inter-Regular.woff2') format('woff2'),
          url('static/fonts/Inter-Regular.woff') format('woff');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'Inter';
        src: url('static/fonts/Inter-Medium.woff2') format('woff2'),
          url('static/fonts/Inter-Medium.woff') format('woff');
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'Inter';
        src: url('static/fonts/Inter-SemiBold.woff2') format('woff2'),
          url('static/fonts/Inter-SemiBold.woff') format('woff');
        font-weight: 600;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'Inter';
        src: url('static/fonts/Inter-Bold.woff2') format('woff2'),
          url('static/fonts/Inter-Bold.woff') format('woff');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'JetBrains Mono';
        src: url('static/fonts/JetBrainsMono-Regular.woff2') format('woff2'),
          url('static/fonts/JetBrainsMono-Regular.woff') format('woff');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'JetBrains Mono';
        src: url('static/fonts/JetBrainsMono-Medium.woff2') format('woff2'),
          url('static/fonts/JetBrainsMono-Medium.woff') format('woff');
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'JetBrains Mono';
        src: url('static/fonts/JetBrainsMono-SemiBold.woff2') format('woff2'),
          url('static/fonts/JetBrainsMono-SemiBold.woff') format('woff');
        font-weight: 600;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'JetBrains Mono';
        src: url('static/fonts/JetBrainsMono-Bold.woff2') format('woff2'),
          url('static/fonts/JetBrainsMono-Bold.woff') format('woff');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--color-bg, #0b0f14);
        color: var(--color-fg, #e5e7eb);
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      body {
        min-height: 100vh;
      }

      #app-shell {
        display: grid;
        min-height: 100vh;
        grid-template-areas: 'shell';
      }

      #app-shell > * {
        grid-area: shell;
      }

      .boot-frame {
        width: 100%;
        height: 100vh;
        border: 0;
        display: block;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <main id="app-shell" aria-label="Session 87 application shell"></main>
    <script type="module">
      const shell = document.getElementById('app-shell');
      const frame = document.createElement('iframe');
      frame.className = 'boot-frame';
      frame.src = 'src/pages/console.html';
      frame.title = 'Session 87 Console';
      frame.loading = 'eager';
      frame.referrerPolicy = 'no-referrer';
      shell.appendChild(frame);
    </script>
  </body>
</html>
